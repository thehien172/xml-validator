{% extends "base.html" %}
{% block title %}{% if item %}Sửa rule{% else %}Thêm rule{% endif %}{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">{% if item %}Sửa rule{% else %}Thêm rule{% endif %}</h1>
    <div class="page-subtitle">Khai báo rule kiểm tra thuộc một bộ rule cụ thể.</div>
</div>

<div class="card">
    <h2 class="card-title">Thông tin rule</h2>

    <form method="POST">
        <label>Bộ rule</label>
        <select name="bo_rule_id" required>
            {% for b in bo_rules %}
                <option value="{{ b.id }}" {% if item and item.bo_rule_id == b.id %}selected{% endif %}>
                    {{ b.ma_bo_rule }} - {{ b.ten_bo_rule }}
                </option>
            {% endfor %}
        </select>

        <label>Tên rule</label>
        <input type="text" name="ten_rule" required value="{{ item.ten_rule if item else '' }}" placeholder="Check mã bác sĩ">

        <label>Thông báo</label>
        <textarea name="thong_bao" required placeholder="Nội dung cảnh báo khi rule fail">{{ item.thong_bao if item else '' }}</textarea>

        <label>Severity</label>
        <select name="severity">
            <option value="WARNING" {% if not item or item.severity == 'WARNING' %}selected{% endif %}>WARNING</option>
            <option value="ERROR" {% if item and item.severity == 'ERROR' %}selected{% endif %}>ERROR</option>
        </select>

        <label>Trạng thái rule</label>
        <select name="is_active">
            <option value="1" {% if not item or item.is_active %}selected{% endif %}>Bật</option>
            <option value="0" {% if item and not item.is_active %}selected{% endif %}>Tắt</option>
        </select>

        <div class="actions">
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a href="/rules" class="btn btn-secondary">Quay lại</a>
        </div>
    </form>
</div>
{% endblock %}
