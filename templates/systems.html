{% extends "base.html" %}
{% block title %}Hệ thống{% endblock %}

{% block content %}
<h1>Quản trị hệ thống</h1>

<div class="filter-box">
    <form method="GET">
        <div class="row">
            <div class="col">
                <label>Tìm kiếm theo tên</label>
                <input type="text" name="keyword" value="{{ keyword }}" placeholder="L2, L3...">
            </div>
        </div>

        <button class="btn btn-primary" type="submit">Tìm</button>
        <a href="/systems" class="btn">Xóa lọc</a>
        <a href="/systems/create" class="btn">+ Thêm hệ thống</a>
    </form>
</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Tên hệ thống</th>
            <th>Số đơn vị</th>
            <th>Thao tác</th>
        </tr>
    </thead>
    <tbody>
        {% for x in items %}
        <tr>
            <td>{{ x.id }}</td>
            <td>{{ x.ten_he_thong }}</td>
            <td>{{ x.don_vis|length }}</td>
            <td class="actions">
                <a class="btn" href="/systems/{{ x.id }}/edit">Sửa</a>
                <form class="inline" method="POST" action="/systems/{{ x.id }}/delete" onsubmit="return confirm('Xóa hệ thống này?');">
                    <button class="btn btn-danger" type="submit">Xóa</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
