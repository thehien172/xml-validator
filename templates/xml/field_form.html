{% extends "base.html" %}
{% block title %}{% if item %}Sửa field{% else %}Thêm field{% endif %}{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">{% if item %}Sửa field{% else %}Thêm field{% endif %}</h1>
    <div class="page-subtitle">Khai báo trường dữ liệu để dùng trong rule trigger và validate.</div>
</div>

<div class="card">
    <h2 class="card-title">Thông tin field</h2>

    <form method="POST">
        <label>Tên trường</label>
        <input
            type="text"
            id="ten_truong"
            name="ten_truong"
            required
            value="{{ item.ten_truong if item else '' }}"
            placeholder="Họ tên"
        >

        <label>XML</label>
        <select name="xml_id" required>
            {% for x in xmls %}
                <option value="{{ x.id }}" {% if item and item.xml_id == x.id %}selected{% endif %}>
                    {{ x.ma_xml }} - {{ x.ten_xml }}
                </option>
            {% endfor %}
        </select>

        <label>XML path (trong item)</label>
        <input
            type="text"
            id="xml_path"
            name="xml_path"
            required
            value="{{ item.xml_path if item else '' }}"
            placeholder="./HO_TEN"
        >

        <label>Kiểu dữ liệu</label>
        <select name="data_type">
            <option value="STRING" {% if item and item.data_type == 'STRING' %}selected{% endif %}>STRING</option>
            <option value="NUMBER" {% if item and item.data_type == 'NUMBER' %}selected{% endif %}>NUMBER</option>
            <option value="DATE" {% if item and item.data_type == 'DATE' %}selected{% endif %}>DATE</option>
            <option value="BOOLEAN" {% if item and item.data_type == 'BOOLEAN' %}selected{% endif %}>BOOLEAN</option>
        </select>

        <div class="actions">
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a href="/fields" class="btn btn-secondary">Quay lại</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const nameInput = document.getElementById('ten_truong');
        const pathInput = document.getElementById('xml_path');

        if (!nameInput || !pathInput) return;

        let pathManuallyEdited = false;

        const normalizePathFromName = (nameValue) => {
            const value = (nameValue || '').trim();
            return value ? './' + value : './';
        };

        const syncPathFromName = () => {
            if (pathManuallyEdited) return;
            pathInput.value = normalizePathFromName(nameInput.value);
        };

        const initialName = (nameInput.value || '').trim();
        const initialPath = (pathInput.value || '').trim();
        const expectedInitialPath = normalizePathFromName(initialName);

        if (!initialPath || initialPath === expectedInitialPath) {
            pathManuallyEdited = false;
        } else {
            pathManuallyEdited = true;
        }

        nameInput.addEventListener('input', syncPathFromName);

        pathInput.addEventListener('input', function () {
            const currentPath = (pathInput.value || '').trim();
            const expectedPath = normalizePathFromName(nameInput.value);

            pathManuallyEdited = currentPath !== '' && currentPath !== expectedPath;
        });

        syncPathFromName();
    });
</script>
{% endblock %}
